spring.application.name=report-app

# JWT public key (RS256) — must match the private key used by api-handler
jwt.public-key=${JWT_PUBLIC_KEY:}
spring.config.import=optional:file:.env[.properties]
server.port=${SERVER_PORT:8081}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/reportdb}
spring.data.mongodb.auto-index-creation=false

# RabbitMQ (same cluster as api-handler)
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# AWS SES (same credentials pattern as api-handler)
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}
aws.region=${AWS_REGION:us-east-1}
aws.role-arn=${AWS_ROLE_ARN:}

# Report settings
report.mail.recipient=${REPORT_MAIL_RECIPIENT:admin@travel-agency.com}
report.mail.from=${REPORT_MAIL_FROM:reports@travel-agency.com}
report.revenue.per-person-per-week=${REPORT_REVENUE_PER_PERSON:1000.0}

# Scheduler timezone
spring.task.scheduling.pool.size=2
