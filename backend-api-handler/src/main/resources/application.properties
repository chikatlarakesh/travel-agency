# Application
spring.application.name=api-handler
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=local

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/authdb}
spring.data.mongodb.auto-index-creation=true

# JWT
jwt.private-key=${JWT_PRIVATE_KEY:}
jwt.public-key=${JWT_PUBLIC_KEY:}
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:900}
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:604800}

# Custom CAPTCHA
captcha.length=${CAPTCHA_LENGTH:6}
captcha.expiry-seconds=${CAPTCHA_EXPIRY_SECONDS:300}
captcha.image-width=${CAPTCHA_IMAGE_WIDTH:200}
captcha.image-height=${CAPTCHA_IMAGE_HEIGHT:60}
captcha.max-cache-size=${CAPTCHA_MAX_CACHE_SIZE:10000}
captcha.case-sensitive=${CAPTCHA_CASE_SENSITIVE:true}

# Security / Rate Limiting
security.rate-limit.max-attempts=${RATE_LIMIT_MAX_ATTEMPTS:10}
security.rate-limit.window-minutes=15
security.account-lock.max-attempts=${ACCOUNT_LOCK_MAX_ATTEMPTS:5}
security.account-lock.duration-minutes=${ACCOUNT_LOCK_DURATION_MINUTES:15}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Server
server.ssl.enabled=false

# SpringDoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.path=/v3/api-docs

# Mail (AWS SES API via STS AssumeRole ? no SMTP needed)
# Credentials come from AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION, AWS_ROLE_ARN
# Spring Mail properties below are not used but kept for reference
spring.mail.host=${MAIL_HOST:email-smtp.us-east-1.amazonaws.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application mail settings
app.mail.from=${MAIL_FROM:noreply@travel-agency.com}
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# AWS S3 (avatar & document storage)
aws.s3.bucket=${AWS_S3_BUCKET:travel-agency-app}
aws.region=${AWS_REGION:us-east-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.session-token=${AWS_SESSION_TOKEN:}
aws.role-arn=${AWS_ROLE_ARN:}

# Email verification token expiry (seconds) ? 24 hours
app.email.token.expiry-seconds=${EMAIL_TOKEN_EXPIRY_SECONDS:86400}

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.health.mail.enabled=false
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}


# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# Required for indexes on embedded classes
spring.data.mongodb.auto-index-creation=true

# Serialize LocalDate as ISO-8601 strings
spring.jackson.serialization.write-dates-as-timestamps=false

# AWS SES (Password Recovery)
aws.ses.region=${AWS_SES_REGION:us-east-1}
aws.ses.sender-email=${AWS_SES_SENDER_EMAIL:no-reply@example.com}

# ===========================================================================
# OAuth2 Social Login ? US-16 (Google / Facebook)
# Credentials supplied via environment variables ? never hardcoded.
# ===========================================================================

# Google OIDC registration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# Facebook OAuth2 registration (structure-ready; credentials optional)
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.facebook.authorization-grant-type=authorization_code

# Frontend redirect targets
# Where to send the browser after a successful login (existing user)
app.oauth2.redirectUri=${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
# Where to send the browser when onboarding is required (new user)
app.oauth2.signupUri=${OAUTH2_SIGNUP_URI:http://localhost:3000/oauth2/signup}

# HMAC-SHA256 key for signing onboarding tokens (TTL=10 min).
# MUST be overridden in production via the OAUTH2_ONBOARDING_SECRET env var.
app.oauth2.onboarding.token-secret=${OAUTH2_ONBOARDING_SECRET:dev-onboarding-secret-change-in-prod}


